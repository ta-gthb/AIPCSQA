services:
  - type: web
    name: aipcsqa-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure value
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: REPORT_DIR
        value: ./reports
      - key: MAX_AUDIO_MB
        value: "50"
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL, e.g. https://aipcsqa.vercel.app

  - type: cron
    name: aipcsqa-keepalive
    runtime: python
    region: oregon
    schedule: "* * * * *"
    rootDir: backend
    buildCommand: ""
    startCommand: python -c "import os, urllib.request; url=os.getenv('BACKEND_HEALTH_URL','https://aipcsqa-backend.onrender.com/health'); print('Pinging', url); urllib.request.urlopen(url, timeout=20).read(); print('ok')"
    envVars:
      - key: BACKEND_HEALTH_URL
        sync: false          # Optional override; default targets aipcsqa-backend /health
