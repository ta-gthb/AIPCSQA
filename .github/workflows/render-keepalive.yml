name: Render Keepalive

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Validate keepalive URL is configured
        env:
          KEEPALIVE_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$KEEPALIVE_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL secret is not set."
            exit 1
          fi

      - name: Ping Render health endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          echo "Pinging $KEEPALIVE_URL"
          curl --fail --show-error --silent \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "$KEEPALIVE_URL"
