name: Render Keepalive

on:
  schedule:
    # Every 1 minute
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve keepalive URL
        id: resolve
        env:
          SECRET_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          URL="$SECRET_URL"

          # Fallback for this repository's Render service name.
          if [ -z "$URL" ]; then
            URL="https://aipcsqa-backend.onrender.com/health"
          fi

          echo "keepalive_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Using keepalive URL: $URL"

      - name: Ping Render health endpoint
        env:
          KEEPALIVE_URL: ${{ steps.resolve.outputs.keepalive_url }}
        run: |
          echo "Pinging $KEEPALIVE_URL"
          curl --fail --show-error --silent \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "$KEEPALIVE_URL"
